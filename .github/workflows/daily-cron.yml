name: Daily Policy Analyze · Assign · Reminder

on:
  schedule:
    # 早上 8:00 台灣時間 = UTC 00:00 → 分配保單 + 寄信
    - cron: "0 0 * * *"
    # 晚上 9:00 台灣時間 = UTC 13:00 → 提醒
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "要執行的工作"
        required: true
        default: "assign"
        type: choice
        options:
          - analyze   # 手動觸發用（平時改用 Claude Code Agent Skill 批次分析，不自動排程以省 API 成本）
          - assign
          - remind

jobs:
  analyze-daily:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'analyze'
    runs-on: ubuntu-latest
    steps:
      - name: 雲端分析（僅手動觸發備援；平時用 Claude Code Agent Skill 批次）
        run: |
          for i in $(seq 1 6); do
            echo "── batch $i ──"
            RESP=$(curl -s -X POST "${{ secrets.APP_URL }}/api/cron/analyze-daily" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json")
            echo "$RESP"
            # 若本批沒有分析任何一筆（analyzed:0），代表待分析清空，提前結束
            echo "$RESP" | grep -q '"analyzed":0' && { echo "no more pending, stop"; break; }
          done

  assign-daily:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'assign' || github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: 每日分配保單
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/assign-daily" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body

  notify-reminder:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'remind' || github.event.schedule == '0 13 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: 晚間提醒通知
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/notify-reminder" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
